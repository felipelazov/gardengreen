# =============================================================================
# BROWNFIELD INTAKE — Existing Project Assessment (4 Phases)
# =============================================================================
# Assessment workflow for projects that already exist and need
# evaluation, improvement planning, or modernization.
#
# This workflow is ideal for:
#   - Legacy systems needing modernization
#   - Projects with technical debt requiring assessment
#   - Handoff from another team/vendor
#   - Adding new features to existing products
#   - Post-mortem analysis of struggling projects
#   - Due diligence for acquisition/investment
#
# Output: Audit report + Gap analysis + Improvement PRD (delta)
# The PRD covers only improvements, not a full system rewrite.
#
# Author: Synkra AIOX — Squad PM
# Version: 1.0.0
# Last updated: 2026-03-08
# =============================================================================

name: Brownfield Intake
id: brownfield-intake
version: 1.0.0
description: >-
  Assessment de projeto existente: audit → gap analysis → improvement plan →
  PRD delta. Avalia o estado atual do projeto, identifica gaps entre o estado
  atual e o desejado, prioriza melhorias e gera um PRD focado apenas nas
  mudancas necessarias (nao reescrita completa).
trigger: "*brownfield {project_name}"
executor: pm-chief

# =============================================================================
# GLOBAL CONFIGURATION
# =============================================================================

config:
  # Brownfield-specific settings
  assessment_mode: true
  delta_prd: true                   # PRD covers changes only, not full system
  preserve_existing: true           # Never recommend full rewrite as first option

  # Quality thresholds
  quality:
    minimum_audit_score: 6.0        # For current state assessment
    minimum_prd_score: 7.0          # Delta PRD needs to be precise
    minimum_dimension_score: 5.0
    gap_analysis_completeness: 0.80 # 80% of areas must be assessed

  # Execution preferences
  execution:
    default_mode: interactive
    parallel_enabled: true
    estimated_total_time: "1-3 dias"
    elicit_frequently: true         # Many questions about existing system

  # Output directories
  paths:
    intake: "docs/intake/"
    audit: "docs/audit/"
    gap_analysis: "docs/gap-analysis/"
    planning: "docs/planning/"
    prd: "docs/prd/"

  # Error handling
  error_handling:
    on_task_failure: "halt_and_report"
    on_gate_failure: "block_and_fix"
    on_missing_docs: "document_as_gap"  # Missing docs = gap to analyze
    max_task_retries: 2

# =============================================================================
# PHASE 0: CURRENT STATE AUDIT
# =============================================================================
# Parse existing documentation, analyze current state, and produce a
# comprehensive audit of where the project stands today.
#
# This phase is heavily interactive — we need the user to provide
# access to existing docs, codebase, and answer questions about
# the current state that may not be documented.
#
# Key activities:
#   - Parse any existing documentation (PRDs, specs, READMEs)
#   - Diagnose current project health (scope, quality, technical debt)
#   - Inventory existing artifacts and their quality
#   - Identify undocumented knowledge and tribal knowledge risks
# =============================================================================

phases:
  phase_0_audit:
    name: "Current State Audit"
    description: >-
      Auditoria do estado atual do projeto. Parsear documentacao existente,
      diagnosticar saude do projeto, inventariar artefatos e identificar
      conhecimento nao documentado. Esta fase responde a pergunta:
      'Onde estamos hoje?'
    order: 0
    estimated_duration: "3-6 horas"

    agents:
      primary: pm-chief
      support:
        - pm-auditor

    tasks:
      - id: intake-parser
        name: "Parse Existing Documentation"
        agent: pm-chief
        worker: intake-parser.py
        execution_type: hybrid
        description: >-
          Parsear toda documentacao existente do projeto. Diferente do
          greenfield intake, aqui o parser busca e cataloga documentos
          que ja existem: PRDs, specs, READMEs, wikis, tickets, etc.
          O objetivo e construir um inventario completo de artefatos.
        inputs:
          - existing_docs_path: "{user-provided path to existing docs}"
          - codebase_path: "{user-provided path to codebase}"
          - project_name: "{project_name}"
        outputs:
          - "docs/audit/artifact-inventory.yaml"
          - "docs/intake/parsed-intake.yaml"
        elicit: true
        elicit_points:
          - question: "Onde esta a documentacao existente do projeto?"
            type: "path"
            examples: ["docs/", "wiki/", "confluence export", "Google Drive folder"]
          - question: "Onde esta o codebase?"
            type: "path"
            examples: ["./src/", "../legacy-app/", "GitHub repo URL"]
          - question: "Existem documentos em outros formatos (Notion, Confluence, Google Docs)?"
            type: "boolean"
            follow_up: "Se sim, exportar para Markdown e colocar em docs/legacy/"
        artifact_categories:
          documentation:
            - "PRDs / specs / requirements"
            - "Architecture docs / ADRs"
            - "API documentation"
            - "User guides / manuals"
            - "README files"
          project_management:
            - "Backlog / ticket system exports"
            - "Sprint/iteration history"
            - "Roadmaps / release plans"
            - "Meeting notes / decision logs"
          technical:
            - "Database schemas / ERDs"
            - "Infrastructure diagrams"
            - "CI/CD configuration"
            - "Test suites / coverage reports"
            - "Performance benchmarks"
          business:
            - "Business models / canvases"
            - "User research / interviews"
            - "Analytics dashboards / reports"
            - "Stakeholder communications"
        inventory_format:
          per_artifact:
            - name: "artifact name"
            - path: "file path"
            - type: "category from above"
            - format: "md/yaml/json/pdf/docx/other"
            - last_updated: "date if available"
            - quality: "good/outdated/incomplete/missing"
            - relevance: "high/medium/low"
        on_error:
          action: "warn_and_continue"
          message: "Parsing parcial. Documentos nao parseados serao listados como gaps."

      - id: project-diagnostic
        name: "Project Health Diagnostic"
        agent: pm-chief
        description: >-
          Diagnosticar saude geral do projeto baseado nos artefatos
          inventariados e informacoes coletadas. Avaliar 6 dimensoes
          de saude do projeto e gerar um health score.
        inputs:
          - "docs/audit/artifact-inventory.yaml"
          - "docs/intake/parsed-intake.yaml"
          - codebase_access: "{if available}"
        outputs:
          - "docs/project-brief.yaml"
          - "docs/audit/health-diagnostic.md"
        preconditions:
          - "intake-parser completed"
        health_dimensions:
          documentation_health:
            description: "Documentacao existe, esta atualizada e e util?"
            scoring: "1-10"
            checks:
              - "Quantidade de docs existentes vs esperados"
              - "Data de ultima atualizacao (> 6 meses = risco)"
              - "Consistencia entre documentos"
              - "Cobertura de areas criticas"
          code_health:
            description: "Codebase esta saudavel, testavel e mantenivel?"
            scoring: "1-10"
            checks:
              - "Existem testes? Qual a cobertura?"
              - "CI/CD configurado e funcional?"
              - "Dependencias atualizadas?"
              - "Padroes de codigo consistentes?"
            note: "Avaliacao superficial pelo PM — deep dive e para @architect/@dev"
          process_health:
            description: "Processos de desenvolvimento estao definidos?"
            scoring: "1-10"
            checks:
              - "Existe um workflow de desenvolvimento definido?"
              - "Code review e praticado?"
              - "Releases sao planejados ou ad-hoc?"
              - "Existe gestao de backlog?"
          product_health:
            description: "O produto atende as necessidades dos usuarios?"
            scoring: "1-10"
            checks:
              - "Existem metricas de uso/engajamento?"
              - "Feedback de usuarios e coletado?"
              - "Feature requests sao rastreados?"
              - "Existe gap entre o produto e o mercado?"
          team_health:
            description: "O time esta saudavel e produtivo?"
            scoring: "1-10"
            checks:
              - "Tamanho do time vs escopo do projeto"
              - "Existe conhecimento concentrado (bus factor)?"
              - "Onboarding de novos membros e facil?"
              - "Moral/satisfacao do time"
          business_health:
            description: "O projeto esta saudavel do ponto de vista de negocio?"
            scoring: "1-10"
            checks:
              - "Receita/metricas de negocio em crescimento?"
              - "Custo de operacao sustentavel?"
              - "Competidores avancando?"
              - "Stakeholders satisfeitos?"
        overall_health_score: "Average of 6 dimensions"
        health_verdict:
          healthy: "score >= 7.0 — projeto saudavel, melhorias incrementais"
          at_risk: "score 5.0-6.9 — problemas significativos, intervencao necessaria"
          critical: "score < 5.0 — problemas graves, avaliacao profunda necessaria"
        elicit: true
        elicit_points:
          - "Qual a principal preocupacao com o projeto hoje?"
          - "O que funciona bem e nao deveria mudar?"
          - "Ha areas que o time evita mexer (medo de quebrar)?"
          - "Qual foi a ultima release significativa? Quando?"
        on_error:
          action: "halt_and_report"
          message: "Diagnostico falhou. Nao e possivel prosseguir sem health assessment."

      - id: phase-audit
        name: "Artifact Quality Audit"
        agent: pm-auditor
        execution_type: hybrid
        description: >-
          Auditar a qualidade dos artefatos existentes usando o framework
          de 10 dimensoes. Diferente do audit do full-pm-cycle (que audita
          artefatos gerados pelo squad), aqui auditamos artefatos legados
          para determinar o que pode ser reaproveitado vs o que precisa
          ser refeito.
        inputs:
          - "docs/audit/artifact-inventory.yaml"
          - "docs/audit/health-diagnostic.md"
          - existing_docs: "all discovered artifacts"
        outputs:
          - "docs/audit/artifact-quality-audit.md"
        preconditions:
          - "project-diagnostic completed"
        audit_focus:
          reusability_assessment:
            description: >-
              Para cada artefato existente, determinar:
              1. REUSE: Artefato esta bom, pode ser usado como esta
              2. UPDATE: Artefato tem base boa mas precisa atualizacao
              3. REPLACE: Artefato esta desatualizado/errado, precisa ser refeito
              4. MISSING: Artefato nao existe e deveria existir
            output_format:
              per_artifact:
                - name: "artifact name"
                - verdict: "REUSE | UPDATE | REPLACE | MISSING"
                - reason: "why this verdict"
                - effort: "low | medium | high"
                - priority: "critical | important | nice-to-have"
          tribal_knowledge_risk:
            description: >-
              Identificar areas onde o conhecimento existe apenas na
              cabeca de pessoas especificas (bus factor = 1).
            checks:
              - "Areas do codigo sem documentacao E sem testes"
              - "Processos que dependem de uma pessoa especifica"
              - "Decisoes de arquitetura nao documentadas"
              - "Configuracoes nao versionadas"
        on_error:
          action: "warn_and_continue"
          message: "Audit parcial. Areas nao auditadas serao marcadas como 'needs assessment'."

    quality_gate:
      name: "Current State Audit Complete"
      type: blocking
      criteria:
        - id: "gate_0_1"
          name: "artifact_inventory_complete"
          description: "Inventario de artefatos gerado"
          check: "file_exists('docs/audit/artifact-inventory.yaml')"
        - id: "gate_0_2"
          name: "health_diagnostic_complete"
          description: "Diagnostico de saude com 6 dimensoes avaliadas"
          check: "file_exists('docs/audit/health-diagnostic.md') AND all_6_dimensions_scored"
        - id: "gate_0_3"
          name: "quality_audit_complete"
          description: "Auditoria de qualidade dos artefatos existentes"
          check: "file_exists('docs/audit/artifact-quality-audit.md')"
        - id: "gate_0_4"
          name: "project_brief_generated"
          description: "Project brief gerado com diagnostico brownfield"
          check: "file_exists('docs/project-brief.yaml') AND project_brief.type == 'brownfield'"
      on_pass:
        action: "log_and_advance"
        message: >-
          Audit completo. Health score: {health_score}/10.
          Artefatos inventariados: {artifact_count}.
          Avancando para Gap Analysis.
      on_fail:
        action: "block_and_fix"
        message: "Audit incompleto. Faltam: {failed_criteria}."
        fix_suggestions:
          - "Se inventario faltando: verificar se paths de docs foram fornecidos"
          - "Se diagnostico incompleto: fornecer mais informacoes sobre o projeto"
          - "Se audit parcial: revisar artefatos nao avaliados"

    outputs:
      - path: "docs/audit/artifact-inventory.yaml"
        description: "Inventario completo de artefatos existentes com classificacao"
      - path: "docs/audit/health-diagnostic.md"
        description: "Diagnostico de saude do projeto (6 dimensoes)"
      - path: "docs/audit/artifact-quality-audit.md"
        description: "Auditoria de qualidade com veredicto por artefato (REUSE/UPDATE/REPLACE/MISSING)"
      - path: "docs/project-brief.yaml"
        description: "Project brief tipo brownfield com diagnostico"

    rollback:
      trigger: "insufficient information to complete audit"
      steps:
        - "Documentar quais areas nao puderam ser avaliadas"
        - "Listar informacoes necessarias para completar o audit"
        - "Solicitar ao usuario acesso adicional ou respostas"
        - "Salvar audit parcial para nao perder progresso"

  # =============================================================================
  # PHASE 1: GAP ANALYSIS
  # =============================================================================
  # Compare current state (from audit) with desired state (from user goals).
  # Identify gaps in functionality, quality, documentation, process, and risk.
  # Produce a structured gap analysis that drives the improvement plan.
  #
  # This phase answers: "Where do we want to be, and what's missing?"
  # =============================================================================

  phase_1_gap_analysis:
    name: "Gap Analysis"
    description: >-
      Comparar estado atual (do audit) com estado desejado (dos objetivos
      do usuario). Identificar gaps em funcionalidade, qualidade,
      documentacao, processo e risco. Responde: 'Onde queremos estar
      e o que falta?'
    order: 1
    estimated_duration: "2-4 horas"

    agents:
      primary: requirements-engineer
      support:
        - risk-strategist
        - pm-chief

    tasks:
      - id: gather-requirements
        name: "Gather Desired State Requirements"
        agent: requirements-engineer
        description: >-
          Coletar requisitos do estado desejado. Diferente do greenfield,
          aqui nao partimos do zero — partimos do que ja existe e
          perguntamos: 'O que precisa mudar?'. Requisitos sao do tipo
          DELTA: descrevem a mudanca necessaria, nao o sistema completo.
        inputs:
          - "docs/audit/artifact-inventory.yaml"
          - "docs/audit/health-diagnostic.md"
          - "docs/audit/artifact-quality-audit.md"
          - "docs/project-brief.yaml"
        outputs:
          - "docs/gap-analysis/desired-state.yaml"
          - "docs/gap-analysis/gap-matrix.md"
        preconditions:
          - "phase_0_audit.quality_gate PASSED"
        elicit: true
        elicit_points:
          - "Quais sao os objetivos principais para o projeto nos proximos 3-6 meses?"
          - "Quais problemas ATUAIS sao mais urgentes de resolver?"
          - "Existem features novas que precisam ser adicionadas?"
          - "Existem problemas de performance, seguranca ou escalabilidade?"
          - "O que os usuarios mais reclamam?"
          - "Existe pressao competitiva que exige mudancas rapidas?"
        gap_categories:
          functional_gaps:
            description: "Features que faltam ou nao funcionam adequadamente"
            analysis:
              - "Features solicitadas pelos usuarios que nao existem"
              - "Features existentes que nao atendem os requisitos"
              - "Features que existem mas estao quebradas/bugadas"
              - "Features que existem mas sao dificeis de usar"
          quality_gaps:
            description: "Problemas de qualidade no produto/codigo"
            analysis:
              - "Bugs conhecidos nao resolvidos"
              - "Performance abaixo do aceitavel"
              - "Seguranca com vulnerabilidades conhecidas"
              - "Acessibilidade nao atendida"
              - "Cobertura de testes insuficiente"
          documentation_gaps:
            description: "Documentacao faltante, desatualizada ou incompleta"
            analysis:
              - "Artefatos classificados como REPLACE ou MISSING no audit"
              - "Areas sem nenhuma documentacao"
              - "Documentacao tecnica vs documentacao de usuario"
          process_gaps:
            description: "Processos de desenvolvimento ausentes ou ineficientes"
            analysis:
              - "CI/CD nao configurado ou incompleto"
              - "Code review nao praticado"
              - "Testes nao automatizados"
              - "Deploy manual ou arriscado"
          risk_gaps:
            description: "Riscos nao identificados ou nao mitigados"
            analysis:
              - "Riscos tecnicos (dependencias desatualizadas, vendor lock-in)"
              - "Riscos de negocio (competidores, mercado)"
              - "Riscos de time (bus factor, rotatividade)"
              - "Riscos regulatorios (LGPD, compliance)"
        gap_matrix_format:
          columns:
            - area: "Categoria do gap"
            - current_state: "Como esta hoje"
            - desired_state: "Como deveria ser"
            - gap_severity: "critical | high | medium | low"
            - effort_estimate: "S | M | L | XL"
            - dependencies: "Outros gaps que dependem deste"
        on_error:
          action: "halt_and_report"
          message: "Gap analysis falhou. Nao e possivel planejar melhorias sem gaps identificados."

      - id: risk-assessment
        name: "Risk Assessment (Brownfield)"
        agent: risk-strategist
        description: >-
          Avaliar riscos especificos de projetos brownfield. Alem dos
          riscos padrao, incluir riscos de migracao, compatibilidade,
          regressao e knowledge loss.
        inputs:
          - "docs/gap-analysis/desired-state.yaml"
          - "docs/gap-analysis/gap-matrix.md"
          - "docs/audit/health-diagnostic.md"
          - "docs/audit/artifact-quality-audit.md"
        outputs:
          - "docs/gap-analysis/brownfield-risk-register.md"
        preconditions:
          - "gather-requirements completed"
        brownfield_specific_risks:
          migration_risks:
            - "Data migration failures or data loss"
            - "Schema changes breaking existing features"
            - "Third-party API changes during migration"
          compatibility_risks:
            - "New features breaking existing functionality"
            - "Dependency upgrades causing incompatibilities"
            - "Browser/device compatibility changes"
          regression_risks:
            - "Fixing one thing breaks another"
            - "Insufficient test coverage to catch regressions"
            - "Undocumented side effects of existing code"
          knowledge_risks:
            - "Key team members leaving (bus factor)"
            - "Tribal knowledge not documented"
            - "Original architects/developers unavailable"
          technical_debt_risks:
            - "Debt accumulation rate vs paydown rate"
            - "Critical paths through debt-heavy code"
            - "Debt preventing new feature development"
        minimum_risks: 10
        on_error:
          action: "warn_and_continue"
          message: "Risk assessment parcial. Riscos criticos devem ser re-avaliados."

    quality_gate:
      name: "Gap Analysis Complete"
      type: blocking
      criteria:
        - id: "gate_1_1"
          name: "desired_state_defined"
          description: "Estado desejado definido com objetivos claros"
          check: "file_exists('docs/gap-analysis/desired-state.yaml') AND has_objectives"
        - id: "gate_1_2"
          name: "gap_matrix_complete"
          description: "Gap matrix com pelo menos 5 gaps identificados em 3+ categorias"
          check: "file_exists('docs/gap-analysis/gap-matrix.md') AND gap_count >= 5 AND categories >= 3"
        - id: "gate_1_3"
          name: "gaps_severity_classified"
          description: "Todos os gaps tem severidade atribuida"
          check: "all_gaps_have_severity"
        - id: "gate_1_4"
          name: "brownfield_risks_assessed"
          description: "Riscos especificos de brownfield avaliados"
          check: "file_exists('docs/gap-analysis/brownfield-risk-register.md') AND risk_count >= 10"
      on_pass:
        action: "log_and_advance"
        message: >-
          Gap Analysis completo. {gap_count} gaps identificados.
          Criticos: {critical_count}. Avancando para Improvement Plan.
      on_fail:
        action: "block_and_fix"
        message: "Gap Analysis incompleto. Faltam: {failed_criteria}."
        fix_suggestions:
          - "Se desired state vago: fazer mais perguntas sobre objetivos de 3-6 meses"
          - "Se poucos gaps: revisar todas as 5 categorias sistematicamente"
          - "Se riscos insuficientes: revisar riscos especificos de brownfield"

    outputs:
      - path: "docs/gap-analysis/desired-state.yaml"
        description: "Estado desejado com objetivos e requisitos delta"
      - path: "docs/gap-analysis/gap-matrix.md"
        description: "Matriz de gaps com severidade, esforco e dependencias"
      - path: "docs/gap-analysis/brownfield-risk-register.md"
        description: "Registro de riscos especificos de brownfield"

    rollback:
      trigger: "gaps cannot be properly assessed"
      steps:
        - "Verificar se audit da fase 0 esta completo"
        - "Se audit incompleto: voltar para phase_0_audit com mais informacoes"
        - "Se desired state vago: sessao adicional com usuario para clarificar objetivos"

  # =============================================================================
  # PHASE 2: IMPROVEMENT PLAN
  # =============================================================================
  # Prioritize gaps, create implementation schedule, and estimate costs.
  # This phase produces a roadmap of improvements ordered by impact and effort.
  #
  # Key output: A prioritized improvement backlog with schedule and cost.
  # =============================================================================

  phase_2_improvement_plan:
    name: "Improvement Plan"
    description: >-
      Priorizar gaps, criar cronograma de implementacao e estimar custos.
      Produz um roadmap de melhorias ordenado por impacto e esforco.
      O plano de melhoria e incremental — nao recomenda reescrita total
      a menos que o health score seja critico (< 3.0).
    order: 2
    estimated_duration: "2-4 horas"

    agents:
      primary: prioritization-engine
      support:
        - schedule-planner
        - cost-estimator

    tasks:
      - id: prioritize-backlog
        name: "Prioritize Improvement Backlog"
        agent: prioritization-engine
        worker: rice-calculator.py
        execution_type: hybrid
        description: >-
          Priorizar gaps como items de backlog usando RICE scoring.
          Para brownfield, o 'Reach' considera quantos usuarios sao
          afetados pelo gap, e 'Impact' considera a severidade do gap.
          Gaps criticos de seguranca/performance sempre tem boost de prioridade.
        inputs:
          - "docs/gap-analysis/gap-matrix.md"
          - "docs/gap-analysis/desired-state.yaml"
          - "docs/gap-analysis/brownfield-risk-register.md"
          - "docs/audit/health-diagnostic.md"
        outputs:
          - "docs/planning/improvement-backlog.yaml"
          - "docs/planning/prioritization-rationale.md"
        preconditions:
          - "phase_1_gap_analysis.quality_gate PASSED"
        brownfield_prioritization_rules:
          priority_boost:
            - category: "security vulnerabilities"
              boost: "+3 to Impact score"
              reason: "Security gaps are always urgent"
            - category: "data loss risks"
              boost: "+3 to Impact score"
              reason: "Data integrity is non-negotiable"
            - category: "regression-prone areas"
              boost: "+2 to Impact score"
              reason: "Stabilization before new features"
          grouping_strategy:
            description: >-
              Agrupar gaps relacionados em 'improvement themes' para
              execucao eficiente. Ex: todos os gaps de testes juntos,
              todos os gaps de documentacao juntos.
            themes:
              - "Stabilization: bugs, regressions, test coverage"
              - "Security: vulnerabilities, auth, input validation"
              - "Performance: speed, scalability, optimization"
              - "Features: new functionality requested by users"
              - "Documentation: missing/outdated docs"
              - "Process: CI/CD, code review, deployment"
              - "Technical Debt: refactoring, dependency updates"
          incremental_approach:
            description: >-
              Sempre recomendar abordagem incremental. Dividir melhorias
              em ondas/iterations. Primeira onda = estabilizacao + seguranca.
              Segunda onda = features criticas. Terceira onda = nice-to-haves.
            waves:
              wave_1: "Stabilization + Security (weeks 1-4)"
              wave_2: "Critical Features + Performance (weeks 5-8)"
              wave_3: "Documentation + Process + Nice-to-haves (weeks 9-12)"
        on_error:
          action: "retry_once"
          fallback: "Agent prioritizes manually using MoSCoW"

      - id: create-schedule
        name: "Create Improvement Schedule"
        agent: schedule-planner
        worker: cost-estimator.py
        execution_type: hybrid
        description: >-
          Criar cronograma de implementacao das melhorias. Organizado em
          ondas/iteracoes com dependencias entre gaps respeitadas.
          Inclui buffers para risco de regressao (comum em brownfield).
        inputs:
          - "docs/planning/improvement-backlog.yaml"
          - "docs/gap-analysis/brownfield-risk-register.md"
          - "docs/project-brief.yaml"
        outputs:
          - "docs/planning/improvement-schedule.md"
        preconditions:
          - "prioritize-backlog completed"
        brownfield_schedule_considerations:
          regression_buffer:
            description: "Adicionar 20-30% de buffer para regressions em brownfield"
            calculation: "base_estimate * 1.25 (25% regression buffer)"
          parallel_development:
            description: "Identificar quais melhorias podem ser desenvolvidas em paralelo"
            constraint: "Melhorias no mesmo modulo/area nao devem ser paralelas"
          testing_overhead:
            description: "Brownfield requer mais tempo de teste por change"
            calculation: "testing_time = development_time * 0.5 (vs 0.3 for greenfield)"
          deployment_strategy:
            options:
              - "Big bang: tudo de uma vez (alto risco, nao recomendado)"
              - "Phased: por onda/iteracao (recomendado)"
              - "Feature flags: deploy code, enable incrementally (ideal se suportado)"
              - "Blue/green: parallel environments (se infraestrutura permite)"
        on_error:
          action: "warn_and_continue"
          message: "Schedule parcial gerado. Estimativas podem precisar refinamento."

      - id: estimate-cost
        name: "Estimate Improvement Cost"
        agent: cost-estimator
        worker: cost-estimator.py
        execution_type: hybrid
        description: >-
          Estimar custo das melhorias. Para brownfield, custos incluem
          nao apenas desenvolvimento mas tambem: tempo de investigacao
          do codigo legado, testes de regressao adicionais, e possivel
          migracao de dados.
        inputs:
          - "docs/planning/improvement-schedule.md"
          - "docs/planning/improvement-backlog.yaml"
          - "docs/project-brief.yaml"
        outputs:
          - "docs/planning/improvement-cost-estimate.md"
        preconditions:
          - "create-schedule completed"
        brownfield_cost_factors:
          investigation_overhead:
            description: "Tempo para entender codigo legado antes de modificar"
            multiplier: "1.3-1.5x (30-50% mais que greenfield)"
          regression_testing:
            description: "Custo adicional de testes de regressao"
            multiplier: "1.2x (20% mais que greenfield)"
          data_migration:
            description: "Se schema changes necessarias"
            estimate: "separate line item per migration"
          rollback_preparation:
            description: "Custo de preparar rollback para cada change"
            multiplier: "1.1x (10% adicional)"
          total_brownfield_premium:
            description: "Custo total de brownfield vs greenfield equivalente"
            typical_range: "1.5-2.5x greenfield estimate"
        cost_scenarios:
          optimistic: "base_cost * brownfield_premium * 0.8"
          likely: "base_cost * brownfield_premium"
          pessimistic: "base_cost * brownfield_premium * 1.3"
        on_error:
          action: "warn_and_continue"
          message: "Estimativa de custo parcial. Refinamento necessario."

    quality_gate:
      name: "Improvement Plan Complete"
      type: blocking
      criteria:
        - id: "gate_2_1"
          name: "backlog_prioritized"
          description: "Backlog de melhorias priorizado com scoring"
          check: "file_exists('docs/planning/improvement-backlog.yaml') AND all_items_scored"
        - id: "gate_2_2"
          name: "schedule_with_waves"
          description: "Cronograma organizado em ondas/iteracoes"
          check: "file_exists('docs/planning/improvement-schedule.md') AND has_waves"
        - id: "gate_2_3"
          name: "cost_estimated"
          description: "Custo estimado com 3 cenarios"
          check: "file_exists('docs/planning/improvement-cost-estimate.md') AND has_3_scenarios"
        - id: "gate_2_4"
          name: "incremental_approach"
          description: "Plano segue abordagem incremental (nao big-bang)"
          check: "improvement_plan.approach == 'incremental'"
      on_pass:
        action: "log_and_advance"
        message: >-
          Improvement Plan completo. {improvement_count} melhorias planejadas
          em {wave_count} ondas. Custo estimado: {cost_range}.
          Avancando para Delta PRD.
      on_fail:
        action: "block_and_fix"
        message: "Improvement Plan incompleto. Faltam: {failed_criteria}."

    outputs:
      - path: "docs/planning/improvement-backlog.yaml"
        description: "Backlog de melhorias priorizado com RICE scores"
      - path: "docs/planning/prioritization-rationale.md"
        description: "Justificativa da priorizacao"
      - path: "docs/planning/improvement-schedule.md"
        description: "Cronograma em ondas com buffers para regressao"
      - path: "docs/planning/improvement-cost-estimate.md"
        description: "Estimativa de custo com premium brownfield"

    rollback:
      trigger: "improvement plan unrealistic"
      steps:
        - "Revisar scope — reducir quantidade de melhorias"
        - "Revisitar priorizacao — manter apenas criticos na wave 1"
        - "Ajustar timeline — estender prazos se necessario"
        - "Recalcular custo com scope reduzido"

  # =============================================================================
  # PHASE 3: DELTA PRD
  # =============================================================================
  # Write a PRD that covers only the improvements (not the full system).
  # This is a "delta" PRD — it describes what changes, not what exists.
  #
  # Key difference from greenfield PRD:
  #   - Assumes existing system context
  #   - Requirements are change-based (modify X, add Y, remove Z)
  #   - Must explicitly state what NOT to change
  #   - Impact analysis for each change required
  # =============================================================================

  phase_3_delta_prd:
    name: "Delta PRD"
    description: >-
      PRD que cobre apenas as melhorias (nao o sistema completo).
      Descreve o que muda, o que e adicionado, o que e removido —
      e explicitamente o que NAO muda. Cada requisito inclui
      analise de impacto no sistema existente.
    order: 3
    estimated_duration: "2-4 horas"

    agents:
      primary: pm-chief
      support:
        - requirements-engineer
        - prd-validator

    tasks:
      - id: write-prd
        name: "Write Delta PRD"
        agent: pm-chief
        description: >-
          Escrever PRD delta baseado no improvement plan. O PRD usa uma
          estrutura adaptada que separa claramente: MODIFICAR (features
          existentes que mudam), ADICIONAR (features novas), REMOVER
          (features/debt a eliminar), e PRESERVAR (o que nao muda).
        inputs:
          - "docs/planning/improvement-backlog.yaml"
          - "docs/planning/improvement-schedule.md"
          - "docs/gap-analysis/gap-matrix.md"
          - "docs/gap-analysis/desired-state.yaml"
          - "docs/audit/health-diagnostic.md"
          - "docs/audit/artifact-quality-audit.md"
          - "docs/project-brief.yaml"
        outputs:
          - "docs/prd.md"
          - "docs/prd/requirements.yaml"
          - "docs/prd/requirements.md"
        template: "prd-tmpl.yaml"
        preconditions:
          - "phase_2_improvement_plan.quality_gate PASSED"
        delta_prd_structure:
          section_1_context:
            title: "Current State & Improvement Goals"
            content:
              - "System overview (what exists today)"
              - "Health diagnostic summary"
              - "Improvement objectives (from gap analysis)"
              - "What is explicitly OUT OF SCOPE for this improvement cycle"
          section_2_changes:
            title: "Change Specification"
            subsections:
              modify:
                title: "MODIFY — Changes to Existing Features"
                format: "FR-MOD-XXX: Modify {feature} to {desired behavior}"
                required_fields:
                  - current_behavior: "How it works today"
                  - desired_behavior: "How it should work after change"
                  - impact_analysis: "What else might be affected by this change"
                  - acceptance_criteria: "How to verify the change works correctly"
                  - regression_risks: "What could break"
              add:
                title: "ADD — New Features"
                format: "FR-ADD-XXX: Add {new feature}"
                required_fields:
                  - description: "What the new feature does"
                  - integration_points: "How it connects to existing system"
                  - acceptance_criteria: "How to verify it works"
                  - impact_on_existing: "How adding this affects existing features"
              remove:
                title: "REMOVE — Deprecation & Cleanup"
                format: "FR-REM-XXX: Remove {feature/debt}"
                required_fields:
                  - what_to_remove: "Exactly what is being removed"
                  - reason: "Why it should be removed"
                  - migration_path: "How users/data transition"
                  - impact_analysis: "What breaks if this is removed"
              preserve:
                title: "PRESERVE — Explicitly Unchanged"
                description: >-
                  List critical features/areas that must NOT change.
                  This prevents unintended modifications and gives
                  developers clear boundaries.
                format: "List of areas/features with 'DO NOT MODIFY' label"
          section_3_nfr:
            title: "Non-Functional Improvements"
            focus: "Only NFRs that change. Existing NFRs that remain the same are not listed."
          section_4_epics:
            title: "Improvement Epics (by Wave)"
            structure:
              - "Wave 1 epics (stabilization + security)"
              - "Wave 2 epics (critical features + performance)"
              - "Wave 3 epics (documentation + process)"
          section_5_impact:
            title: "Impact Analysis Summary"
            content:
              - "Modules affected by changes"
              - "Database changes required"
              - "API changes (breaking vs non-breaking)"
              - "User-facing changes (UI, workflows)"
              - "Infrastructure changes"
          section_6_rollback:
            title: "Rollback Plan"
            content:
              - "Per-wave rollback procedures"
              - "Data rollback strategy"
              - "Feature flag fallback (if applicable)"
        constitutional_check:
          article_iv: >-
            Every change in the delta PRD must trace to a gap in the
            gap matrix. No invented improvements.
        on_error:
          action: "halt_and_report"
          message: "Delta PRD nao escrito. Verificar inputs."

      - id: validate-prd
        name: "Validate Delta PRD"
        agent: prd-validator
        worker: prd-validator.py
        execution_type: hybrid
        description: >-
          Validar delta PRD. Alem das 7 dimensoes padrao, validar
          dimensoes especificas de brownfield: completude da analise
          de impacto, cobertura de rollback, e consistencia com
          o gap matrix.
        inputs:
          - "docs/prd.md"
          - "docs/prd/requirements.md"
          - "docs/gap-analysis/gap-matrix.md"
          - "docs/gap-analysis/desired-state.yaml"
          - "docs/audit/artifact-quality-audit.md"
        outputs:
          - "docs/prd/prd-validation-report.md"
        preconditions:
          - "write-prd completed"
        standard_dimensions:
          - "Structure"
          - "Requirements Quality"
          - "Traceability"
          - "Acceptance Criteria"
          - "Epic Sequencing"
          - "Technical Assumptions"
          - "Scope"
        brownfield_extra_dimensions:
          - name: "Impact Analysis"
            description: "Every MODIFY and REMOVE has impact analysis"
            weight_boost: "+5% (reduces other dimensions proportionally)"
          - name: "Rollback Coverage"
            description: "Every wave has rollback plan"
            weight_boost: "+3%"
          - name: "Gap Traceability"
            description: "Every change traces to a gap in the matrix"
            weight_boost: "+2%"
        verdicts:
          PASS: "Overall >= 7.0 AND min dimension >= 5.0"
          CONDITIONAL_PASS: "Overall >= 7.0 BUT impact analysis < 5.0"
          NEEDS_REVISION: "Overall 5.0-6.9"
          FAIL: "Overall < 5.0"
        on_pass:
          action: "mark_delta_prd_approved"
          message: >-
            Delta PRD aprovado (score: {score}). Pacote de melhoria
            pronto para desenvolvimento.
        on_fail:
          action: "generate_fix_list_and_return"
          return_to: "write-prd"
          max_iterations: 2
          message: "Delta PRD reprovado. Fix list gerada."
        on_error:
          action: "retry_once"
          fallback: "Agent validates manually"

    quality_gate:
      name: "Delta PRD Approved"
      type: blocking
      blocking: true
      criteria:
        - id: "gate_3_1"
          name: "delta_requirements_documented"
          description: "Requisitos delta (MODIFY/ADD/REMOVE) documentados"
          check: "requirements.yaml has FR-MOD-* OR FR-ADD-* OR FR-REM-*"
        - id: "gate_3_2"
          name: "prd_score_sufficient"
          description: "Delta PRD score >= 7.0"
          check: "prd_validation_report.overall_score >= 7.0"
        - id: "gate_3_3"
          name: "impact_analysis_complete"
          description: "Analise de impacto para todas as mudancas MODIFY e REMOVE"
          check: "all_modify_remove_have_impact_analysis"
        - id: "gate_3_4"
          name: "preserve_list_defined"
          description: "Lista de areas PRESERVE definida"
          check: "preserve_section_not_empty"
        - id: "gate_3_5"
          name: "rollback_plan_exists"
          description: "Plano de rollback por onda definido"
          check: "rollback_plan_per_wave"
        - id: "gate_3_6"
          name: "gap_traceability"
          description: "Todos os changes traceiam para gaps no gap matrix"
          check: "all_changes_trace_to_gaps"
      on_pass:
        action: "present_results"
        message: >-
          Brownfield Intake completo!

          Artefatos gerados:
          - Health Diagnostic: docs/audit/health-diagnostic.md
          - Artifact Inventory: docs/audit/artifact-inventory.yaml
          - Quality Audit: docs/audit/artifact-quality-audit.md
          - Gap Matrix: docs/gap-analysis/gap-matrix.md
          - Risk Register: docs/gap-analysis/brownfield-risk-register.md
          - Improvement Backlog: docs/planning/improvement-backlog.yaml
          - Improvement Schedule: docs/planning/improvement-schedule.md
          - Cost Estimate: docs/planning/improvement-cost-estimate.md
          - Delta PRD: docs/prd.md
          - Validation Report: docs/prd/prd-validation-report.md

          O Delta PRD esta pronto para desenvolvimento.
          Para desenvolvimento, use: @dev *develop-story
      on_fail:
        action: "block_and_fix"
        message: "Delta PRD nao aprovado. Corrigir issues listados."
        escalation:
          after_retries: 2
          escalate_to: "pm-chief"
          message: "Delta PRD falhou 2x. Revisar escopo de melhorias."

    outputs:
      - path: "docs/prd.md"
        description: "Delta PRD com changes (MODIFY/ADD/REMOVE/PRESERVE)"
      - path: "docs/prd/requirements.yaml"
        description: "Requisitos delta estruturados"
      - path: "docs/prd/requirements.md"
        description: "Requisitos delta em Markdown"
      - path: "docs/prd/prd-validation-report.md"
        description: "Relatorio de validacao do Delta PRD"

    rollback:
      trigger: "delta PRD fails validation 2+ times"
      steps:
        - "Analisar fix lists para problema raiz"
        - "Se impacto analysis fraco: revisar com mais detalhes por modulo"
        - "Se traceability ruim: voltar para gap matrix e melhorar links"
        - "Se scope creep: reducir scope do delta para wave 1 apenas"

# =============================================================================
# WORKFLOW COMPLETION
# =============================================================================

completion:
  output_summary: "Audit report + Gap analysis + Improvement PRD (delta)"
  deliverables_package:
    - "docs/audit/health-diagnostic.md — Diagnostico de saude (6 dimensoes)"
    - "docs/audit/artifact-inventory.yaml — Inventario de artefatos"
    - "docs/audit/artifact-quality-audit.md — Qualidade dos artefatos (REUSE/UPDATE/REPLACE/MISSING)"
    - "docs/gap-analysis/gap-matrix.md — Matriz de gaps com severidade"
    - "docs/gap-analysis/brownfield-risk-register.md — Riscos especificos brownfield"
    - "docs/planning/improvement-backlog.yaml — Backlog priorizado de melhorias"
    - "docs/planning/improvement-schedule.md — Cronograma por ondas"
    - "docs/planning/improvement-cost-estimate.md — Estimativa de custo com premium brownfield"
    - "docs/prd.md — Delta PRD (MODIFY/ADD/REMOVE/PRESERVE)"
  next_steps:
    - action: "Start improvement development"
      command: "@dev *develop-story"
      when: "Delta PRD is approved and team is ready"
    - action: "Run full PM cycle for planning"
      command: "*full-cycle {project_name} --start-phase 4"
      when: "Need additional planning (stakeholders, OKRs, full audit)"
    - action: "Deep technical assessment"
      command: "@architect *brownfield-discovery"
      when: "Need architecture-level assessment beyond PM scope"

# =============================================================================
# LIFECYCLE HOOKS
# =============================================================================

lifecycle_hooks:
  on_workflow_start:
    - action: "create_project_directories"
      directories:
        - "docs/intake/"
        - "docs/audit/"
        - "docs/gap-analysis/"
        - "docs/planning/"
        - "docs/prd/"
    - action: "log_brownfield_start"
      message: "Brownfield Intake iniciado para projeto: {project_name}"
    - action: "warn_about_data_access"
      message: >-
        Este workflow requer acesso ao codebase e documentacao existente.
        Certifique-se de que os paths estao acessiveis antes de continuar.

  on_phase_complete:
    - action: "checkpoint_save"
    - action: "show_progress"
      format: "Phase {N}/{total} complete. Next: {next_phase_name}"

  on_workflow_complete:
    - action: "generate_summary"
    - action: "suggest_next_steps"

  on_workflow_failure:
    - action: "save_state"
    - action: "suggest_recovery"
      options:
        - "*resume-brownfield": "Retomar do ultimo checkpoint"
        - "*restart-brownfield": "Reiniciar do zero"
        - "*full-cycle {project_name}": "Mudar para ciclo completo"

# =============================================================================
# STATE MANAGEMENT
# =============================================================================

state_management:
  persistence_file: "docs/.brownfield-state.yaml"
  checkpoint_frequency: "after_each_phase"
  resume_command: "*resume-brownfield"

# =============================================================================
# ERROR HANDLING
# =============================================================================

error_handling:
  global_rules:
    - rule: "missing_documentation"
      description: "Projeto sem documentacao existente"
      action: >-
        Nao e um erro — e um gap. Documentar como 'MISSING' no inventario.
        Ajustar health score de documentacao para 1-2.
        Prosseguir com informacoes disponiveis.

    - rule: "no_codebase_access"
      description: "Nao ha acesso ao codebase"
      action: >-
        Limitar audit a documentacao e informacoes do usuario.
        Marcar code_health como 'NOT ASSESSED'.
        Recomendar assessment tecnico posterior com @architect/@dev.

    - rule: "incomplete_answers"
      description: "Usuario nao sabe responder perguntas sobre o projeto"
      action: >-
        Documentar como gap de conhecimento.
        Incrementar tribal_knowledge_risk.
        Prosseguir com dados disponiveis.

    - rule: "legacy_format_docs"
      description: "Documentos em formato nao parseavel (PDF, Confluence, etc)"
      action: >-
        Solicitar exportacao para Markdown ou texto plano.
        Se impossivel, criar resumos manuais dos documentos.
        Documentar limitacao no audit.

  recovery_options:
    - "*resume-brownfield": "Retomar do ultimo checkpoint"
    - "*restart-phase {N}": "Reiniciar fase especifica"
    - "*abort-brownfield": "Abortar e salvar artefatos parciais"
    - "*full-cycle {project_name}": "Escalar para ciclo completo"
