# =============================================================================
# WORKFLOW LIFECYCLE HOOKS
# =============================================================================
# Hooks that execute at specific points in the workflow lifecycle.
# =============================================================================

lifecycle_hooks:
  on_workflow_start:
    - action: "create_project_directory_structure"
      description: "Criar estrutura de diretorios se nao existe"
      directories:
        - "docs/intake/"
        - "docs/discovery/"
        - "docs/prd/"
        - "docs/planning/"
        - "docs/audit/"
        - "docs/deliverables/"
        - "docs/stories/"
    - action: "log_workflow_start"
      description: "Registrar inicio do workflow com timestamp"

  on_phase_complete:
    - action: "checkpoint_save"
      description: "Salvar estado do workflow para retomada"
    - action: "notify_user"
      description: "Notificar usuario da conclusao da fase"

  on_workflow_complete:
    - action: "generate_workflow_summary"
      description: "Gerar resumo do ciclo completo com metricas"
    - action: "cleanup_temp_files"
      description: "Limpar arquivos temporarios de workers"

  on_workflow_failure:
    - action: "save_failure_state"
      description: "Salvar estado no ponto de falha para debug"
    - action: "notify_user_with_recovery"
      description: "Notificar usuario com opcoes de recuperacao"

# =============================================================================
# STATE MANAGEMENT
# =============================================================================
# Workflow state is persisted to allow resumption after interruptions.
# =============================================================================

state_management:
  persistence_file: "docs/.workflow-state.yaml"
  checkpoint_frequency: "after_each_phase"
  state_fields:
    - current_phase: "phase ID currently executing"
    - completed_phases: "list of completed phase IDs"
    - gate_results: "map of gate ID → pass/fail with scores"
    - profile: "project profile (simple/standard/enterprise)"
    - methodology: "selected methodology"
    - start_time: "workflow start timestamp"
    - last_checkpoint: "last checkpoint timestamp"
  resume_command: "*resume-full-cycle"
  resume_behavior: >-
    Ao resumir, carregar estado do arquivo de persistencia.
    Iniciar a partir da ultima fase incompleta.
    Re-verificar gates de fases anteriores (quick check, nao re-execucao).
    Notificar usuario do ponto de retomada.

# =============================================================================
# ERROR HANDLING & ESCALATION
# =============================================================================
# Global error handling rules that apply across all phases.
# =============================================================================

error_handling:
  global_rules:
    - rule: "task_failure"
      description: "Um task individual falha durante execucao"
      action: "Retry once. If still fails, check if task has fallback. If no fallback, halt phase."
      escalation: "After 2 retries, escalate to pm-chief"

    - rule: "gate_failure"
      description: "Um quality gate nao e satisfeito"
      action: "Generate fix list. Return to responsible task. Max 3 iterations."
      escalation: "After 3 gate failures, escalate to pm-chief for scope review"

    - rule: "agent_unavailable"
      description: "O agente designado nao esta disponivel"
      action: "Fallback to pm-chief for the task. Log degraded execution."
      escalation: "None — pm-chief handles all fallback"

    - rule: "worker_failure"
      description: "Um worker Python falha durante execucao"
      action: "Fallback to agent-only execution. Log that worker was not used."
      escalation: "None — graceful degradation"

    - rule: "critical_failure"
      description: "Falha critica que impede continuacao do workflow"
      action: "Save state. Notify user. Provide recovery options."
      escalation: "Immediate notification to user with full error context"

  recovery_options:
    - "*resume-full-cycle": "Retomar do ultimo checkpoint"
    - "*restart-phase {N}": "Reiniciar fase especifica"
    - "*skip-gate {gate_id}": "Pular gate (requer confirmacao explicita do usuario)"
    - "*rollback-phase {N}": "Reverter fase e re-executar"
    - "*abort-cycle": "Abortar ciclo e salvar artefatos parciais"
