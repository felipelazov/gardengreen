      appetite: "small batch (1-2 weeks) or big batch (6 weeks)"
    terminology:
      backlog_item: "Pitch"
      iteration: "Cycle"
      estimation_unit: "Appetite (small/big batch)"

  waterfall:
    description: "Waterfall — sequential phases, WBS, Gantt"
    phase_2_output_format: "wbs"
    phase_3_method: "MoSCoW"
    phase_3_worker: null
    phase_4_schedule_format: "gantt"
    schedule_details:
      phase_gates: "requirements → design → implementation → testing → deployment"
