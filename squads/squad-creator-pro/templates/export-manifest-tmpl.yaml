# Squad Export Manifest
# Generated by Squad Creator Pro

package:
  name: "{squad_name}"
  version: "{version}"
  exported_at: "{date}"
  exported_by: "squad-creator-pro v1.0.0"
  description: "{description}"

contents:
  agents: {agent_count}
  tasks: {task_count}
  workflows: {workflow_count}
  checklists: {checklist_count}
  templates: {template_count}
  data_files: {data_count}
  minds: {mind_count}
  scripts: {script_count}
  total_files: {total_count}
  total_lines: {total_lines}

file_list:
  agents:
    {agent_files}
  tasks:
    {task_files}
  workflows:
    {workflow_files}
  checklists:
    {checklist_files}
  templates:
    {template_files}
  data:
    {data_files}
  minds:
    {mind_files}

requirements:
  aiox_version: ">= 4.0.0"
  squad_creator: ">= 3.0.0"
  node_version: ">= 18"

external_dependencies:
  {dependencies_or_none}

import_instructions: |
  1. Copy this directory to squads/{squad_name}/
  2. Run: *refresh-registry
  3. Activate: @{entry_agent}

  For detailed instructions, see IMPORT-GUIDE.md

checksums:
  algorithm: "sha256"
  files:
    {file_checksums}
